server {
    # $PORT lo inyecta Railway/Render; si no está definido, cae a 80
    listen ${PORT:-80};
    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta que no sea un fichero estático carga index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
