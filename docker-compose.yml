services:

  # ── Base de datos ────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-lol_tracker}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── API (FastAPI) ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Sobreescribe DB_HOST para que apunte al servicio 'db' de compose
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    # En desarrollo: recarga automática en cambios de código
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app                  # monta el código fuente para --reload

  # ── Frontend (Vite dev server) ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules       # evita sobreescribir node_modules del contenedor
    depends_on:
      - api

  # ── Scheduler ────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    command: python scheduler.py
    volumes:
      - .:/app
      - scheduler_logs:/app/logs

volumes:
  postgres_data:
  scheduler_logs:
